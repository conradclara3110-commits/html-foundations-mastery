<!DOCTYPE html>
<html>
    <head>
        <title>User Profile</title>
    </head>

    <body>

        <h1>User Profile Form</h1>

        <form>

        <fieldset>

        <input type="submit" value="Submit">

        </form>

    </body>

</html>
