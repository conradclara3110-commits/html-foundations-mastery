<!DOCTYPE html>
<html>
    <head>
        <title>Advanced table</title>
    </head>
    <body>

        <h1>Sales Data</h1>

        <table border="1">

            <tr>
                <th>Product</th>
                <th>January</th>
                <th>February</th>
            </tr>

            <tr>
                <td>Coffee</td>
                <td>50</td>
                <td>65</td>
            </tr>

            <tr>
                <td colspan="3">Total sales: 115</td>
            </tr>

        </table>

    </body>
    
</html>
